<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보이스피싱 예방 진단 시스템</title>
<style>
    /* CSS는 이전과 동일하게 유지하되 가독성을 위해 필수 부분만 기재 */
    :root { --primary: #002b5c; --danger: #d32f2f; --bg: #f4f7fa; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); }
    .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: 900; }
    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    .card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 70vh; }
    button { width: 100%; padding: 20px; margin-top: 15px; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: 900; cursor: pointer; }
    .primary { background: var(--primary); color: white; }
    .btn-yes { background: #ff5252; color: white; }
    .btn-no { background: #448aff; color: white; }
    .descBox { margin-top: 20px; padding: 20px; background: #fff9c4; border-radius: 15px; border: 2px solid #fbc02d; font-weight: 800; }
    .video-box { margin-top: 15px; border-radius: 15px; overflow: hidden; border: 4px solid var(--danger); }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .hidden { display: none; }
</style>
</head>
<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
    <div class="card">
        <div id="quiz">
            <div id="question" style="font-size:1.7rem; font-weight:900; margin-bottom:20px; color:var(--primary); text-align:center;"></div>
            <div id="choices"></div>
            
            <div id="descBox" class="descBox hidden"></div>
            
            <div id="dynamicVideoArea"></div>

            <div id="timerText" class="hidden" style="text-align:center; margin-top:15px; color:var(--danger); font-weight:bold;">📍 잠시만 기다려주세요...</div>
            <button id="nextBtn" class="primary hidden">다음 질문 이동 ▶</button>
        </div>
    </div>
</div>

<script>
const questions = [
    { q:"1. 본인이 신청하지 않은 '카드 발급'이나 '배송 안내' 문자를 받은 적 있습니까?", choices:["예 (받았습니다)","아니오"], desc:"개인정보를 빼내기 위한 거짓 수법입니다. 본인이 신청하지 않았다면 즉시 전화를 끊으세요.", risk:3, videoId:"EC8lTWKjCQM", vTitle:"📽️ 카드배송 빙자 보이스피싱" },
    { q:"2. '명의도용', '범죄 연루', '구속수사'를 언급하며 수사기관(검찰, 경찰)에서 전화가 왔습니까?", choices:["예 (받았습니다)","아니오"], desc:"수사기관은 절대로 전화로 자산 내역을 묻거나 돈을 요구하지 않고, 구속등의 이유로 협박하지 않습니다.", risk:3, videoId:"MULTI", vTitle:"📽️ 수사기관, 검찰 사칭 보이스피싱" },
    { q:"3. 보안 점검 등을 이유로 '특정 앱(원격제어 등)' 설치했습니까?", choices:["예 (설치함)","아니오"], desc:"앱을 설치하는 순간 폰의 정보가 유출되고 전화가 가로채기 당합니다.", risk:5 },
    { q:"4. 금감원(1332)이나 검찰청(1301)에 직접 전화해서 확인해보라고 유도합니까?", choices:["예 (유도함)","아니오"], desc:"악성어플이 설치되면 어디에 전화해도 범인이 전화를 가로채서 받습니다.", risk:5 },
    { q:"5. 텔레그램, 시그널, 라인, 왓츠, 위챗, 시그널 등 메신저로 수사 지시를 받거나 보고하였습니까?", choices:["예 (그렇다)","아니오"], desc:"수사기관은 절대로 메신저를 통해 조사를 진행하지 않습니다.", risk:5 },
    { q:"6. 수사 보안이라며 '주변 사람이나 가족에게 절대 말하지 말라'고 합니까?", choices:["예 (그렇다)","아니오"], desc:"외부 도움을 차단하여 판단력을 흐리게 하려는 범죄 수법입니다.", risk:5 },
    { q:"7. 전화나 영상통화 또는 CCTV로 본인을 계속 감시하고 있다는 느낌을 받고있습니까?", choices:["예 (그렇다)","아니오"], desc:"범인이 실시간으로 상황을 통제하려는 시도입니다. 100% 피싱입니다.", risk:5 },
    { q:"8. 낮은 이자로 대출을 바꿔주겠다며 걸려온 광고 전화를 받았습니까?", choices:["예 (받았습니다)","아니오"], desc:"은행은 먼저 전화를 걸어 낮은 금리로 바꿔주겠다고 하지 않습니다.", risk:3, videoId:"ePcTTZIi2uw", vTitle:"📽️ 대출 빙자 보이스피싱" },
    { q:"9. 대출 약정 위반, 계약위반이라며 당장 현금으로 돈을 갚아야 한다고 합니까?", choices:["예 (그렇다)","아니오"], desc:"전형적인 대출 사기 멘트입니다. 즉시 전화를 끊고 은행에 확인하세요.", risk:5 },
    { q:"10. 현금을 인출하여 직접 전달하거나 특정 계좌로 송금하라고 합니까?", choices:["예 (그렇다)","아니오"], desc:"국가기관은 어떤 경우에도 개인에게 현금을 요구하지 않습니다. 돈을 요구한다면 그건 100% 보이스피싱입니다.", risk:5 },
];

let index = 0;

function loadQ() {
    window.scrollTo(0,0);
    const q = questions[index];
    document.getElementById("question").innerText = q.q;
    
    const c = document.getElementById("choices");
    c.innerHTML = "";
    q.choices.forEach((t, i) => {
        const b = document.createElement("button");
        b.className = (i === 0) ? "btn-yes" : "btn-no";
        b.innerText = t;
        b.onclick = () => answer(i);
        c.appendChild(b);
    });

    // 화면 초기화
    document.getElementById("dynamicVideoArea").innerHTML = "";
    document.getElementById("descBox").classList.add("hidden");
    document.getElementById("nextBtn").classList.add("hidden");
    document.getElementById("timerText").classList.add("hidden");
}

function answer(choiceIdx) {
    const q = questions[index];
    
    // 설명창 표시
    const dBox = document.getElementById("descBox");
    dBox.innerHTML = `📢 경찰관 안내:<br>${q.desc}`;
    dBox.classList.remove("hidden");
    
    // 버튼 비활성화
    const buttons = document.querySelectorAll("#choices button");
    buttons.forEach(btn => btn.disabled = true);

    // 비디오가 있는 경우 재생
    if(q.videoId) {
        const area = document.getElementById("dynamicVideoArea");
        area.innerHTML = `
            <div class="video-box">
                <div style="background:red; color:white; text-align:center; padding:5px;">${q.vTitle}</div>
                <div class="video-container">
                    <iframe id="qFrame" src="" frameborder="0" allowfullscreen></iframe>
                </div>
                ${q.videoId === "MULTI" ? `
                <div style="padding:10px; background:#eee; display:flex; flex-direction:column; gap:5px;">
                    <button onclick="playVid('vNsf2p9CDZQ')" style="font-size:1rem; padding:10px;">영상 1 보기</button>
                    <button onclick="playVid('CvEsZdEL00I')" style="font-size:1rem; padding:10px;">영상 2 보기</button>
                </div>` : ''}
            </div>`;
        playVid(q.videoId === "MULTI" ? 'vNsf2p9CDZQ' : q.videoId);
    }

    // 다음 버튼 활성화 로직 (지연 시간 2초)
    const tText = document.getElementById("timerText");
    const nBtn = document.getElementById("nextBtn");
    
    tText.classList.remove("hidden");
    
    setTimeout(() => {
        tText.classList.add("hidden");
        nBtn.classList.remove("hidden");
    }, 2000);
}

function playVid(id) {
    const frame = document.getElementById("qFrame");
    if(frame) {
        frame.src = `https://www.youtube.com/embed/${id}?autoplay=1&start=8`;
    }
}

document.getElementById("nextBtn").onclick = () => {
    index++;
    if(index < questions.length) {
        loadQ();
    } else {
        alert("진단이 완료되었습니다. (결과 화면 이동 로직 필요)");
    }
};

// 초기 실행
loadQ();
</script>
</body>
</html>
