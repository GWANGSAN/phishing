<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>광주광산경찰서 보이스피싱 진단시스템</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --p-blue: #002b5c; --p-gold: #ffd600; --danger: #d32f2f; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #f0f4f8; color: #111; line-height: 1.5; word-break: keep-all; }
        
        /* 고령층 최적화 시인성 강화 UI */
        .header { background: var(--p-blue); color: white; padding: 20px; text-align: center; font-weight: 900; font-size: 1.45rem; border-bottom: 5px solid var(--p-gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        
        .card { background: white; margin: 12px; border-radius: 20px; padding: 30px 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; flex-direction: column; min-height: 80vh; border: 1px solid #ddd; }
        .card.active { display: flex; }
        
        h2 { color: var(--p-blue); font-size: 2rem; text-align: center; margin-top: 0; font-weight: 900; letter-spacing: -1px; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); background: #f8f9fc; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 0.9rem; border: 1px solid #dee2e6; }
        .stats-bar b { display: block; color: var(--p-blue); font-size: 1.2rem; }
        
        /* 스마트폰 터치 및 고령층 시인성 고려 버튼 */
        button { width: 100%; padding: 22px; margin-top: 15px; border: none; border-radius: 18px; font-size: 1.7rem; font-weight: 900; cursor: pointer; transition: 0.2s; -webkit-appearance: none; }
        .btn-main { background: var(--p-blue); color: white; }
        .btn-red { background: var(--danger); color: white; box-shadow: 0 4px 0 #8b0000; }
        .btn-yes { background: #ff4d4d; color: white; border-bottom: 8px solid #b30000; height: 110px; margin-top: 0; }
        .btn-no { background: #3d85f5; color: white; border-bottom: 8px solid #0a58ca; height: 110px; margin-top: 0; }
        .btn-gold { background: var(--p-gold); color: #000; border: 3px solid #333; }
        button:disabled { background: #ccc !important; border-bottom: none; color: #666; }

        /* 안내 텍스트 */
        .wait-info { text-align: center; color: var(--danger); font-weight: 900; font-size: 1.3rem; margin: 15px 0; background: #fff5f5; padding: 12px; border-radius: 15px; border: 2px dashed var(--danger); }
        
        .video-box { position: relative; border-radius: 15px; overflow: hidden; background: #000; border: 5px solid var(--p-blue); margin-top: 15px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .desc-box { margin-top: 25px; padding: 25px; background: #fffdf0; border-radius: 20px; border: 4px solid var(--p-gold); font-weight: 800; font-size: 1.5rem; line-height: 1.6; position: relative; }
        .desc-tag { display: inline-block; background: var(--p-gold); color: #000; font-size: 1.1rem; padding: 5px 15px; border-radius: 10px; position: absolute; top: -18px; left: 20px; font-weight: 900; border: 2px solid #333; }
        
        .case-item { background: #111; color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 12px solid var(--danger); }
        .case-money { display: block; font-size: 2.3rem; font-weight: 900; text-align: right; color: #ff5252; }
    </style>
</head>
<body>

<div class="header">🚔 광주광산경찰서 보이스피싱 대응팀</div>

<div class="container">
    <div class="card active" id="intro">
        <div class="stats-bar">
            <div>누적 방문<b id="totalV">0</b></div>
            <div>오늘 방문<b id="todayV">0</b></div>
            <div>정보 공유<b id="shareV">0</b></div>
        </div>
        <h2>보이스피싱 진단</h2>
        <p style="text-align:center; font-size:1.6rem; font-weight:900; color:var(--p-blue); margin-bottom:20px;">[긴급] 실제 수사 데이터 기반<br>나의 위험도를 점검하십시오.</p>
        <button class="btn-red" id="btnIntroVid">▶ 교육 영상 시청 (30초)</button>
        <div id="introVidBox" class="video-box" style="display:none;">
            <div class="video-container">
                <iframe id="frameIntro" src="" allow="autoplay; fullscreen"></iframe>
            </div>
        </div>
        <button id="btnStart" class="btn-main" disabled style="margin-top:25px;">영상을 시청해 주세요</button>
    </div>

    <div class="card" id="case">
        <h2 style="color:var(--danger);">🚨 실제 피해 데이터</h2>
        <div class="case-item">2025년 광주청 전체 피해 <span class="case-money">총 279억 원</span></div>
        <div class="case-item">검찰사칭 - 자산검수 수법 <span class="case-money">피해액 1억 원</span></div>
        <div class="case-item">대출사칭 - 계약위반 협박 <span class="case-money">피해액 1,600만 원</span></div>
        <button class="btn-red" style="margin-top:auto;" onclick="goQuiz()">내 상황 진단하기 ▶</button>
    </div>

    <div class="card" id="quiz">
        <div id="qText" style="font-size:1.8rem; font-weight:900; text-align:center; margin-bottom:30px; color:var(--p-blue);"></div>
        <div id="qChoices" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;"></div>
        
        <div id="qResultArea" style="display:none;">
            <div id="qVideoArea"></div>
            <div id="qDesc" class="desc-box">
                <div class="desc-tag">🚔 경찰관 핵심 조언</div>
                <div id="qDescText"></div>
            </div>
            
            <div id="btnTimerBox" class="wait-info">안내를 읽어주세요... <span id="timer">2</span>초</div>
            <button id="btnNext" class="btn-main" style="display:none; margin-top:20px;">내용 확인 완료, 다음 질문 ▶</button>
        </div>
    </div>

    <div class="card" id="result">
        <h2>진단 분석 결과</h2>
        <div id="resTitle" style="font-size:4rem; font-weight:900; text-align:center; margin:25px 0;"></div>
        <div id="resList"></div>
        <button id="btnFinal" class="btn-main" style="margin-top:20px;"></button>
    </div>

    <div class="card" id="final">
        <h2 style="color:var(--danger);">🚨 경찰 긴급 가이드</h2>
        <div style="background:#fff2f2; padding:25px; border-radius:20px; border:4px solid var(--danger); font-size:1.6rem; font-weight:900; line-height:1.8;">
            1. 즉시 <span style="color:red;">비행기모드</span> 전환!<br>
            2. 주변 지인 전화로 <span style="color:red;">112</span> 신고!<br>
            3. 은행에 <span style="color:red;">지급정지</span> 요청!
        </div>
        <button class="btn-gold" onclick="share()" style="margin-top:40px;">📢 가족·지인에게 공유하기</button>
        <button class="btn-main" onclick="location.reload()" style="background:#444;">처음으로</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA2KjZYbexB646qWgZFHgfwl-cTEUNbj3Y",
        authDomain: "phishing-check-647d9.firebaseapp.com",
        projectId: "phishing-check-647d9",
        databaseURL: "https://phishing-check-647d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        storageBucket: "phishing-check-647d9.firebasestorage.app",
        messagingSenderId: "21179667892",
        appId: "1:21179667892:web:e24800f87e0c773b760ee1"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const day = new Date().toISOString().split('T')[0];

    db.ref(`stats/visitors/${day}`).transaction(c => (c || 0) + 1);
    db.ref('stats/visitors/total_accumulated').transaction(c => (c || 0) + 1);
    db.ref(`stats/visitors/${day}`).on('value', s => { document.getElementById('todayV').innerText = (s.val() || 0).toLocaleString(); });
    db.ref('stats/visitors/total_accumulated').on('value', s => { document.getElementById('totalV').innerText = (s.val() || 0).toLocaleString(); });
    db.ref('stats/shares/total').on('value', s => { document.getElementById('shareV').innerText = (s.val() || 0).toLocaleString(); });

  const questions = [
    { q:"1. 본인이 신청하지 않은 '카드 발급'이나 '배송 안내' 문자를 받은 적 있습니까?", choices:["예 (받았습니다)","아니오"], desc:"개인정보를 빼내기 위한 거짓 수법입니다. 본인이 신청하지 않았다면 즉시 전화를 끊으세요.", risk:3, videoId:"EC8lTWKjCQM", vTitle:"📽️ 카드배송 빙자 보이스피싱" },
    { q:"2. '명의도용', '범죄 연루', '구속수사'를 언급하며 수사기관(검찰, 경찰)에서 전화가 왔습니까?", choices:["예 (받았습니다)","아니오"], desc:"수사기관은 절대로 전화로 자산 내역을 묻거나 돈을 요구하지 않고, 구속등의 이유로 협박하지 않습니다.", risk:3, videoId:"MULTI", vTitle:"📽️ 수사기관, 검찰 사칭 보이스피싱" },
    { q:"3. 보안 점검 등을 이유로 '특정 앱(원격제어 등)' 설치했습니까?", choices:["예 (설치함)","아니오"], desc:"앱을 설치하는 순간 폰의 정보가 유출되고 전화가 가로채기 당합니다.", risk:5 },
    { q:"4. 금감원(1332)이나 검찰청(1301)에 직접 전화해서 확인해보라고 유도합니까?", choices:["예 (유도함)","아니오"], desc:"악성어플이 설치되면 어디에 전화해도 범인이 전화를 가로채서 받습니다.", risk:5 },
    { q:"5. 텔레그램, 시그널, 라인, 왓츠, 위챗, 시그널 등 메신저로 수사 지시를 받거나 보고하였습니까?", choices:["예 (그렇다)","아니오"], desc:"수사기관은 절대로 텔레그램, 시그널, 라인, 왓츠, 위챗, 시그널 등 메신저를 통해 조사를 진행하지 않습니다.", risk:5 },
    { q:"6. 수사 보안이라며 '주변 사람이나 가족에게 절대 말하지 말라'고 합니까?", choices:["예 (그렇다)","아니오"], desc:"외부 도움을 차단하여 판단력을 흐리게 하려는 범죄 수법입니다.", risk:5 },
    { q:"7. 전화나 영상통화 또는 CCTV로 본인을 계속 감시하고 있다는 느낌을 받고있습니까?", choices:["예 (그렇다)","아니오"], desc:"범인이 실시간으로 상황을 통제하려는 시도입니다. 100% 피싱입니다.", risk:5 },
    { q:"8. 낮은 이자로 대출을 바꿔주겠다며 걸려온 광고 전화를 받았습니까?", choices:["예 (받았습니다)","아니오"], desc:"은행은 먼저 전화를 걸어 낮은 금리로 바꿔주겠다고 하지 않습니다.", risk:3, videoId:"ePcTTZIi2uw", vTitle:"📽️ 대출 빙자 보이스피싱" },
    { q:"9. 대출 약정 위반, 계약위반이라며 당장 현금으로 돈을 갚아야 한다고 합니까?", choices:["예 (그렇다)","아니오"], desc:"전형적인 대출 사기 멘트입니다. 즉시 전화를 끊고 은행에 확인하세요.", risk:5 },
    { q:"10. 현금을 인출하여 직접 전달하거나 특정 계좌로 송금하라고 합니까?", choices:["예 (그렇다)","아니오"], desc:"국가기관은 어떤 경우에도 개인에게 현금을 요구하지 않습니다. 돈을 요구한다면 그건 100% 보이스피싱입니다.", risk:5 },
];

    let current = 0, results = [], highRisk = false;

    function show(id) { document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }

    document.getElementById('btnIntroVid').onclick = function() {
        this.style.display = 'none';
        document.getElementById('introVidBox').style.display = 'block';
        document.getElementById('frameIntro').src = "https://www.youtube.com/embed/tV-yM5EWJ3k?autoplay=1&mute=1&controls=0&rel=0";
        let time = 0;
        const timer = setInterval(() => {
            time--;
            if(time > 0) document.getElementById('btnStart').innerText = `시청 중 (${time}초)`;
            else { clearInterval(timer); document.getElementById('btnStart').disabled = false; document.getElementById('btnStart').innerText = "진단 시작하기 ▶"; }
        }, 1000);
    };

    document.getElementById('btnStart').onclick = () => show('case');
    function goQuiz() { show('quiz'); loadQ(); }

    function loadQ() {
        const q = questions[current];
        document.getElementById('qText').innerText = q.q;
        const box = document.getElementById('qChoices'); box.innerHTML = "";
        q.choices.forEach((txt, i) => {
            const btn = document.createElement('button');
            btn.innerText = txt; btn.className = (i === 0) ? "btn-yes" : "btn-no";
            btn.onclick = () => handle(i); box.appendChild(btn);
        });
        document.getElementById('qResultArea').style.display = "none";
        document.getElementById('btnNext').style.display = "none";
        document.getElementById('btnTimerBox').style.display = "none";
    }

    // 답변 클릭 시의 로직 고정
    function handle(i) {
        const q = questions[current];
        document.querySelectorAll('#qChoices button').forEach(b => b.disabled = true);
        if(i === 0) { results.push(q); if(q.risk >= 5) highRisk = true; }
        
        // 1. 즉시 영상과 설명 노출
        document.getElementById('qResultArea').style.display = "block";
        document.getElementById('qDescText').innerText = q.desc;
        if(q.vid) {
            const vId = (q.vid === "MULTI") ? "vNsf2p9CDZQ" : q.vid;
            document.getElementById('qVideoArea').innerHTML = `
                <div class="video-box">
                    <div class="video-container">
                        <iframe id="qFrame" src="https://www.youtube.com/embed/${vId}?autoplay=1&mute=1&start=8&controls=0" allow="autoplay"></iframe>
                    </div>
                </div>`;
        } else { document.getElementById('qVideoArea').innerHTML = ""; }

        // 2. 2초 타이머 시작 (다음 버튼 활성화용)
        const timerBox = document.getElementById('btnTimerBox');
        const timerSpan = document.getElementById('timer');
        timerBox.style.display = "block";
        let count = 2;
        timerSpan.innerText = count;

        const timerItv = setInterval(() => {
            count--;
            timerSpan.innerText = count;
            if(count <= 0) {
                clearInterval(timerItv);
                timerBox.style.display = "none";
                document.getElementById('btnNext').style.display = "block"; // 2초 뒤 버튼 노출
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }, 1000);
    }

    document.getElementById('btnNext').onclick = () => { current++; if(current < questions.length) loadQ(); else showResult(); };

    function showResult() {
        show('result');
        const resTitle = document.getElementById('resTitle');
        const btnFinal = document.getElementById('btnFinal');
        if(highRisk) { resTitle.innerText = "🚨 고위험"; resTitle.style.color = "var(--danger)"; btnFinal.innerText = "긴급 가이드 확인 ▶"; }
        else if(results.length > 0) { resTitle.innerText = "⚠️ 주의"; resTitle.style.color = "#f39c12"; btnFinal.innerText = "대응 가이드 확인 ▶"; }
        else { resTitle.innerText = "✅ 안전"; resTitle.style.color = "#2e7d32"; btnFinal.innerText = "진단 완료 ▶"; }
        
        const list = document.getElementById('resList'); list.innerHTML = "";
        results.forEach(item => {
            const d = document.createElement('div');
            d.style = "background:#fdf2f2; padding:22px; border-radius:18px; margin-bottom:15px; border-left:10px solid var(--danger); font-weight:700;";
            d.innerHTML = `<div style="font-size:1.2rem;">${item.q}</div><div style="color:var(--danger); font-size:1.1rem; margin-top:10px;">🚔 경찰관 조언: ${item.desc}</div>`;
            list.appendChild(d);
        });
    }

    document.getElementById('btnFinal').onclick = () => { if(results.length > 0) show('final'); else share(); };

    // 강화된 공유 및 클립보드 복사 로직
    async function share() {
        const shareData = { title: '보이스피싱 진단', text: '부모님, 꼭 한번 진단해보세요! 광주경찰청 보이스피싱 진단 시스템', url: window.location.href };
        try {
            if (navigator.share) {
                await navigator.share(shareData);
                db.ref('stats/shares/total').transaction(c => (c || 0) + 1);
            } else { throw new Error(); }
        } catch (err) {
            const t = document.createElement("textarea");
            document.body.appendChild(t);
            t.value = window.location.href;
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            alert("진단 링크가 복사되었습니다!\n가족 카톡방에 붙여넣어 공유해주세요.");
            db.ref('stats/shares/total').transaction(c => (c || 0) + 1);
        }
    }
</script>
</body>
</html>
